name: CI — Test & Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r webapp/requirements.txt

      - name: Run unit tests
        run: |
          cd tests
          python run_tests.py

      - name: Run five-fixes regression tests
        run: |
          cd tests
          python test_five_fixes.py

      - name: Run hover analysis tests
        run: |
          cd tests
          python test_hover_analysis.py

      - name: Run lag chart tests
        run: |
          cd tests
          python test_lag_chart.py

  docker-build:
    needs: test
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Streamlit image
        run: docker build -t parkview-roi-streamlit -f Dockerfile .

      - name: Build Flask webapp image
        run: docker build -t parkview-roi-webapp -f Dockerfile.webapp .
