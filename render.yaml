services:
  # Streamlit BI Dashboard (primary)
  - type: web
    name: parkview-roi-streamlit
    env: docker
    region: singapore
    plan: free
    dockerfilePath: ./Dockerfile
    healthCheckPath: /
    envVars:
      - key: DEEPSEEK_API_KEY
        sync: false
      - key: PORT
        value: "8501"
    autoDeploy: true

  # Flask Web Application
  - type: web
    name: parkview-roi-webapp
    env: docker
    region: singapore
    plan: free
    dockerfilePath: ./Dockerfile.webapp
    healthCheckPath: /api/health
    envVars:
      - key: DEEPSEEK_API_KEY
        sync: false
      - key: PORT
        value: "8050"
    autoDeploy: true
