version: "3.8"

services:
  streamlit:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: parkview-roi-streamlit
    ports:
      - "8501:8501"
    environment:
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY:-}
    volumes:
      - ./data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8501/"]
      interval: 30s
      timeout: 10s
      retries: 3

  webapp:
    build:
      context: .
      dockerfile: Dockerfile.webapp
    container_name: parkview-roi-webapp
    ports:
      - "8050:8050"
    environment:
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY:-}
    volumes:
      - ./data:/app/data
    restart: unless-stopped
    depends_on:
      streamlit:
        condition: service_started
